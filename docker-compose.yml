services:
  postgres:
    image: postgres:16-alpine
    container_name: modulo_a_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
      POSTGRES_DB: ${POSTGRES_DB:-app_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-app_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: modulo_a_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3101:3001"
      - "5555:5555"
    volumes:
      - ./apps/api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma db push --accept-data-loss && npm run db:seed && npm run start:dev"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: modulo_a_web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
      
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    command: npm run dev

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:

